<header class="main-navbar">
  <div></div>
  <div class="nav-actions">
    <app-link
      to="/dashboard/notifications"
      [showPreIcon]="true"
      [showLabel]="false"
      PreIcon="Notifications"
      variant="ghost"
    >
    </app-link>
    <app-link
      to="/dashboard/settings"
      [showPreIcon]="true"
      [showLabel]="false"
      PreIcon="Settings"
      variant="ghost"
    >
    </app-link>
    <div class="user-profile">
      <img
        class="profile-avatar"
        src="https://placehold.co/32x32"
        alt="Foto de perfil del usuario"
        width="32"
        height="32"
      />
    </div>
  </div>
</header>
