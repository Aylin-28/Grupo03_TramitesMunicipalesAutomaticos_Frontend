<app-layout-landing>
  <header class="header">
    <section class="header-main">
      <a class="link-head" href="/">  
        <h2>AutoGov</h2>
      </a>
      <div>
        <app-link to="/" label="Inicio" variant="inline" />
        <app-link to="/" fragment="services" label="Servicios" variant="inline" />
        <app-link to="/" fragment="features" label="Destacados" variant="inline" />
      </div>
    </section>
    <section class="header-actions">
      <!-- Selected -->
      <app-link to="/auth/centro-ayuda" variant="ghost" [showLabel]="false" [showPreIcon]="true" PreIcon="ContactSupport" />

    </section>
  </header>
</app-layout-landing>
