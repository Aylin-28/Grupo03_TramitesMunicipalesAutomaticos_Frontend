<div class="login-wrapper">
  <div class="login-card">

    <div class="tabs">
      <button class="tab" [class.active]="tab === 'register'" (click)="cambiarTab('register')">
        Registrarse
      </button>

      <button class="tab" [class.active]="tab === 'login'" (click)="cambiarTab('login')">
        Iniciar Sesión
      </button>
    </div>

    <div class="auth-content">
      <app-register *ngIf="tab === 'register'"></app-register>
      <app-login *ngIf="tab === 'login'"></app-login>
    </div>

  </div>
</div>
