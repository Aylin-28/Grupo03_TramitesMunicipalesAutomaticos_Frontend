<div class="login-content">

  <h2>Bienvenido de nuevo</h2>
  <p class="subtitle">
    Acceda a su área personal para gestionar sus trámites y servicios oficiales.
  </p>
  
  <div *ngIf="errorMessage()" class="error-banner">
    {{ errorMessage() }}
  </div>

  <form class="login-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">

    <div class="input-field">
      <label for="dni">DNI</label>
      <div class="input-wrapper">
        <app-icon-component name="Fingerprint" class="input-icon left-icon"></app-icon-component>

        <input type="text" id="dni" placeholder="12345678A" formControlName="document">
      </div>
    </div>

    <div class="input-field">
      <label for="password">CONTRASEÑA</label>

      <div class="input-wrapper">
        <app-icon-component name="Lock" class="input-icon left-icon"></app-icon-component>

        <input [type]="showPassword() ? 'text' : 'password'" id="password" placeholder="••••••••" formControlName="password">

        <app-icon-component [name]="showPassword() ? 'VisibilityOff' : 'Visibility'" class="input-icon right-icon"
          (click)="togglePassword()">
        </app-icon-component>
      </div>
    </div>

    <div class="form-options">
      <label class="remember-me">
        <input type="checkbox">
        <span>Recordarme</span>
      </label>

      <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
    </div>

    <button type="submit" class="submit-btn" style="width: 100%; padding: 12px; background-color: var(--primary-color, #0056b3); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 15px;">
      INGRESAR A LA CUENTA
    </button>

    <div class="divider">
      <span>¿Aún no tienes cuenta?</span>
    </div>

    <app-link to="/auth/register" label="Registrarse" variant="small"></app-link>

  </form>

  <div class="divider">
    <span>O ACCEDER MEDIANTE</span>
  </div>

  <div class="social-login">
    <button class="btn-alt">
      <app-icon-component name="ShieldLock" [size]="18"></app-icon-component>
      Cl@ve
    </button>

    <button class="btn-alt">
      <app-icon-component name="Badge" [size]="18"></app-icon-component>
      DNIe
    </button>
  </div>

  <p class="support-text">
    ¿Necesita ayuda con el acceso?
    <strong>Contacte con soporte técnico</strong>
  </p>

</div>
