<div class="login-content">

  <h2>Bienvenido de nuevo</h2>
  <p class="subtitle">
    Acceda a su área personal para gestionar sus trámites y servicios oficiales.
  </p>

  <form class="login-form">

    <!-- DNI -->
    <div class="input-field">
      <label for="dni">DNI</label>
      <div class="input-wrapper">
        <app-icon-component name="Fingerprint" class="input-icon left-icon"></app-icon-component>

        <input type="text" id="dni" placeholder="12345678A">
      </div>
    </div>

    <!-- PASSWORD -->
    <div class="input-field">
      <label for="password">CONTRASEÑA</label>

      <div class="input-wrapper">
        <app-icon-component name="Lock" class="input-icon left-icon"></app-icon-component>

        <input [type]="showPassword() ? 'text' : 'password'" id="password" placeholder="••••••••">

        <app-icon-component [name]="showPassword() ? 'VisibilityOff' : 'Visibility'" class="input-icon right-icon"
          (click)="togglePassword()">
        </app-icon-component>
      </div>
    </div>

    <!-- OPTIONS -->
    <div class="form-options">
      <label class="remember-me">
        <input type="checkbox">
        <span>Recordarme</span>
      </label>

      <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
    </div>

    <button type="submit" class="btn-primary">
      INGRESAR A LA CUENTA
    </button>

    <div class="divider">
      <span>¿Aún no tienes cuenta?</span>
    </div>

    <app-link to="/auth/register" label="Registrarse" variant="small" />

  </form>

  <!-- DIVIDER -->
  <div class="divider">
    <span>O ACCEDER MEDIANTE</span>
  </div>

  <!-- SOCIAL -->
  <div class="social-login">
    <button class="btn-alt">
      <app-icon-component name="ShieldLock" [size]="18"></app-icon-component>
      Cl@ve
    </button>

    <button class="btn-alt">
      <app-icon-component name="Badge" [size]="18"></app-icon-component>
      DNIe
    </button>
  </div>

  <!-- SUPPORT -->
  <p class="support-text">
    ¿Necesita ayuda con el acceso?
    <strong>Contacte con soporte técnico</strong>
  </p>

</div>
