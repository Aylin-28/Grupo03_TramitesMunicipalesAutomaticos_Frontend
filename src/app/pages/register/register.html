<div class="register-content">
  <h2>Crear cuenta</h2>
  <p class="subtitle">Complete sus datos oficiales para acceder a la sede electrónica</p>

  <form (ngSubmit)="handleSubmit()">
    <div class="input-field">
      <label>APELLIDOS Y NOMBRES COMPLETOS</label>
      <div class="input-wrapper">
        <input type="text" [(ngModel)]="form.nombre" name="nombre" placeholder="Nombre completo" />
      </div>
    </div>

    <div class="input-field">
      <label>TIPO DE DOCUMENTO</label>

      <div class="input-wrapper">
        <select [(ngModel)]="form.tipoDocumento" name="tipoDocumento">
          <option value="dni">DNI</option>
          <option value="ce">Carné de Extranjería</option>
        </select>
      </div>
    </div>

    <div class="input-field">
      <label>NÚMERO DE DOCUMENTO</label>

      <div class="input-wrapper">
        <input type="text" [(ngModel)]="form.numeroDocumento" name="numeroDocumento" (input)="validarDocumento()"
          [attr.maxlength]="form.tipoDocumento === 'dni' ? 8 : 12"
          [attr.inputmode]="form.tipoDocumento === 'dni' ? 'numeric' : 'text'" [placeholder]="form.tipoDocumento === 'dni'
    ? 'Ej: 12345678'
    : 'Ej: A1B2C3D4E5'" />
      </div>
    </div>

    <div class="input-field">
      <label>CORREO ELECTRÓNICO</label>
      <div class="input-wrapper">
        <input type="email" [(ngModel)]="form.correo" name="correo" placeholder="usuario@email.com" />
      </div>
    </div>

    <div class="input-field">
      <label>CREAR CONTRASEÑA</label>
      <div class="input-wrapper">
        <input type="password" [(ngModel)]="form.password" name="password" placeholder="••••••••" />
      </div>
    </div>

    <div class="checkbox-field">
      <label class="checkbox-label">
        <input type="checkbox" [(ngModel)]="form.acepta" name="acepta" />
        <span>Acepto términos y condiciones</span>
      </label>
    </div>

    <button class="btn-primary" type="submit">CREAR CUENTA</button>
  </form>
</div>
